<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 08</title>
</head>
<body>
    <h1>Trabalhando com vídeos e áudios - Aula 08</h1>
    <table cellpadding="100" border="2">
        <thead>
            <tr>
                <td>
                    <a href="./youtube/youtube.html">
                        <img src="./img/youtube.jfif" alt="Imagem Youtube">
                    </a>
                </td>
                <td>
                    <a href="./vimeo/vimeo.html">
                        <img src="./img/vimeo.png" alt="Imagem Vimeo">
                    </a>
                </td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <audio preload="metadata" controls autoplay loop src="audio/videoplayback.mp3">
                    </audio>
                </td>
                <td>
                    <video width="600" poster="thumb.jpg" controls autoplay>
                        <source src="./video/videoplayback.mp4" type="video/mp4">
                    </video>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
